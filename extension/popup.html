<div id="the-space-picker" class="ts-shell">
  <div class="ts-card">
    <div class="ts-header">
      <p class="ts-kicker">The Space</p>
      <button type="button" class="ts-close" data-role="close" aria-label="Close">
        ×
      </button>
    </div>

    <p class="ts-text" data-role="text"></p>

    <div class="ts-label-grid">
      <button type="button" class="ts-label" data-label="source">Source</button>
      <button type="button" class="ts-label" data-label="note">Note</button>
      <button type="button" class="ts-label" data-label="learning">Learning</button>
      <button type="button" class="ts-label" data-label="realization">
        Realization
      </button>
      <button type="button" class="ts-label" data-label="experience">
        Experience
      </button>
    </div>

    <p class="ts-error" data-role="error"></p>

    <button type="button" class="ts-add" data-role="add">Add</button>
  </div>
</div>
